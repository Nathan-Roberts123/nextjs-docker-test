apiVersion: apps/v1
kind: Deployment
metadata:
  name: nextjs-docker-test
  labels:
    app: nextjs-docker-test
  namespace: default
spec:
  selector:
    matchLabels:
      app: nextjs-docker-test
  replicas: 2
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        app: nextjs-docker-test
    spec:
      containers:
        - name: nextjs-docker-test
          image: docker.io/nsindiso/nextjs-docker-test
          ports:
            - containerPort: 3000

          env:
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: nextjs-docker-test-secrets
                  key: DATABASE_URL

          volumeMounts:
            - name: config-volume
              mountPath: /configs/

      volumes:
        - name: config-volume
          configMap:
            name: nextjs-docker-test
